<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTracker</title>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a26;
    --card: #22223a;
    --border: #2e2e4a;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --protein: #3b82f6;
    --carbs: #f59e0b;
    --fat: #ec4899;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 80px; }
  h1, h2, h3 { font-weight: 600; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 1.2rem; color: var(--accent2); }
  .header .date { font-size: 0.8rem; color: var(--muted); }
  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 10; }
  .nav button { flex: 1; padding: 12px 4px 8px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.2s; }
  .nav button.active { color: var(--accent2); }
  .nav button svg { width: 22px; height: 22px; }
  .tab { display: none; padding: 16px 16px; }
  .tab.active { display: block; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .card h3 { font-size: 0.9rem; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .btn { padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
  .btn-icon { background: var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; }
  .macro-bar-wrap { margin-bottom: 10px; }
  .macro-bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.82rem; }
  .macro-bar-label span:first-child { color: var(--text); }
  .macro-bar-label span:last-child { color: var(--muted); }
  .macro-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .macro-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .pill-training { background: #1e3a5f; color: #60a5fa; }
  .pill-rest { background: #1a2e1a; color: var(--green); }
  .exercise-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .exercise-row:last-child { border-bottom: none; }
  .exercise-name { font-size: 0.9rem; font-weight: 500; }
  .exercise-target { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .exercise-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .exercise-check.done { background: var(--accent); border-color: var(--accent); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 16px 16px 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-size: 1.1rem; margin-bottom: 16px; }
  .modal-close { float: right; background: var(--border); border: none; color: var(--text); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
  input, select, textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; width: 100%; outline: none; }
  input:focus, select:focus { border-color: var(--accent); }
  label { font-size: 0.82rem; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 12px; }
  .set-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .set-num { width: 28px; height: 28px; background: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; }
  .set-row input { flex: 1; }
  .meal-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .meal-row:last-child { border-bottom: none; }
  .meal-name { font-size: 0.9rem; font-weight: 500; }
  .meal-macros { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .macro-chips { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .chip { font-size: 0.72rem; padding: 2px 8px; border-radius: 10px; }
  .chip-cal { background: #2e1f4a; color: #c084fc; }
  .chip-p { background: #1e2e4a; color: #60a5fa; }
  .chip-c { background: #2e2010; color: #fbbf24; }
  .chip-f { background: #2e1020; color: #f472b6; }
  .food-search-results { max-height: 180px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; margin-top: 4px; }
  .food-result { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.85rem; display: flex; justify-content: space-between; }
  .food-result:hover { background: var(--border); }
  .food-result:last-child { border-bottom: none; }
  .ingredient-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .ingredient-row span { flex: 1; font-size: 0.85rem; }
  .badge { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .shopping-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .shopping-item:last-child { border-bottom: none; }
  .shopping-item input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }
  .shopping-item label { font-size: 0.9rem; cursor: pointer; margin: 0; color: var(--text); }
  .shopping-item.checked label { text-decoration: line-through; color: var(--muted); }
  .section-title { font-size: 0.78rem; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 0 8px; font-weight: 600; }
  .empty { text-align: center; padding: 32px; color: var(--muted); font-size: 0.9rem; }
  .today-ring-row { display: flex; justify-content: space-around; margin-bottom: 8px; }
  .ring-item { text-align: center; }
  .ring-val { font-size: 1.2rem; font-weight: 700; }
  .ring-label { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .ring-sub { font-size: 0.7rem; color: var(--muted); }
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .mb-8 { margin-bottom: 8px; }
  .justify-between { justify-content: space-between; }
  .align-center { align-items: center; }
  .w-full { width: 100%; }
  .text-muted { color: var(--muted); font-size: 0.85rem; }
  .delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 4px; }
  .delete-btn:hover { color: var(--red); }
  .progress-row { display: flex; justify-content: space-around; text-align: center; margin: 12px 0; }
  .progress-num { font-size: 1.4rem; font-weight: 700; }
  .progress-label { font-size: 0.7rem; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ FitTracker</h1>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="headerDate" class="date"></span>
    <span id="dayTypePill" class="pill pill-training">Training</span>
    <button onclick="openSettings()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:2px 4px">⚙️</button>
  </div>
</div>

<!-- TODAY TAB -->
<div id="tab-today" class="tab active">
  <div class="card">
    <h3>Today's Macros</h3>
    <div id="todayMacros"></div>
  </div>
  <div class="card">
    <div class="flex justify-between align-center mb-8">
      <h3 style="margin:0">Today's Workout</h3>
      <span id="todayWorkoutName" class="text-muted"></span>
    </div>
    <div id="todayWorkoutList"></div>
  </div>
  <div class="card">
    <div class="flex justify-between align-center mb-8">
      <h3 style="margin:0">Meals Logged</h3>
      <button class="btn btn-sm btn-primary" onclick="openAddMealModal()">+ Add</button>
    </div>
    <div id="todayMealList"></div>
  </div>
</div>

<!-- WORKOUT TAB -->
<div id="tab-workout" class="tab">
  <div class="card">
    <div class="flex justify-between align-center mb-8">
      <h3 style="margin:0">Select Day</h3>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-secondary" onclick="exportWorkout()">⬇</button>
        <label class="btn btn-sm btn-secondary" style="cursor:pointer;margin:0">⬆<input type="file" accept=".json" onchange="importWorkout(this)" style="display:none"></label>
        <button class="btn btn-sm btn-secondary" onclick="openWorkoutDiscover()">✨</button>
      <button class="btn btn-sm btn-primary" onclick="openWorkoutEditor(state.selectedWorkoutDay || 'Monday')">Edit</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-sm" id="wdMon" onclick="selectWorkoutDay('Monday')">Mon</button>
      <button class="btn btn-sm" id="wdTue" onclick="selectWorkoutDay('Tuesday')">Tue</button>
      <button class="btn btn-sm" id="wdWed" onclick="selectWorkoutDay('Wednesday')">Wed</button>
      <button class="btn btn-sm" id="wdThu" onclick="selectWorkoutDay('Thursday')">Thu</button>
      <button class="btn btn-sm" id="wdFri" onclick="selectWorkoutDay('Friday')">Fri</button>
      <button class="btn btn-sm" id="wdSat" onclick="selectWorkoutDay('Saturday')">Sat</button>
      <button class="btn btn-sm" id="wdSun" onclick="selectWorkoutDay('Sunday')">Sun</button>
    </div>
  </div>
  <div id="workoutContent"></div>
</div>

<!-- NUTRITION TAB -->
<div id="tab-nutrition" class="tab">
  <div class="card">
    <h3>Daily Targets</h3>
    <div id="nutritionMacros"></div>
    <div id="nutritionTotals" class="progress-row"></div>
  </div>
  <div class="card">
    <div class="flex justify-between align-center mb-8">
      <h3 style="margin:0">Logged Meals</h3>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-secondary" onclick="openEstimator()">🔍 Estimate</button>
        <button class="btn btn-sm btn-primary" onclick="openAddMealModal()">+ Add</button>
      </div>
    </div>
    <div id="nutritionMealList"></div>
  </div>
</div>

<!-- MEALS TAB -->
<div id="tab-meals" class="tab">
  <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center">
    <input id="mealSearchInput" placeholder="Search meals..." oninput="renderMealLibrary(this.value)" style="flex:1;margin:0">
    <button class="btn btn-primary btn-sm" onclick="openMealBuilder()">+ New</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button class="btn btn-secondary btn-sm w-full" onclick="exportMeals()">⬇ Export</button>
    <label class="btn btn-secondary btn-sm w-full" style="text-align:center;cursor:pointer;margin:0">⬆ Import<input type="file" accept=".json" onchange="importMeals(this)" style="display:none"></label>
    <button class="btn btn-primary btn-sm w-full" onclick="openMealDiscover()">✨ Discover</button>
  </div>
  <div id="mealLibraryList"></div>
</div>

<!-- SHOPPING TAB -->
<div id="tab-shopping" class="tab">
  <div class="card">
    <h3>Select Meals to Include</h3>
    <div id="shoppingMealSelect"></div>
    <button class="btn btn-primary w-full mt-8" onclick="generateShoppingList()">Generate List</button>
  </div>
  <div id="shoppingListOutput"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="active" onclick="switchTab('today',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Today
  </button>
  <button onclick="switchTab('workout',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v16M18 4v16M3 8h4M17 8h4M3 16h4M17 16h4"/></svg>
    Workout
  </button>
  <button onclick="switchTab('nutrition',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    Nutrition
  </button>
  <button onclick="switchTab('meals',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
    Meals
  </button>
  <button onclick="switchTab('shopping',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    Shop
  </button>
</nav>

<!-- ADD MEAL MODAL -->
<div class="modal-overlay" id="addMealModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('addMealModal')">✕</button>
    <h2>Log a Meal</h2>
    <div id="addMealContent"></div>
  </div>
</div>

<!-- MEAL BUILDER MODAL -->
<div class="modal-overlay" id="mealBuilderModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('mealBuilderModal')">✕</button>
    <h2 id="mealBuilderTitle">Create Meal</h2>
    <div id="mealBuilderContent"></div>
  </div>
</div>

<!-- LOG WORKOUT MODAL -->
<div class="modal-overlay" id="logWorkoutModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('logWorkoutModal')">✕</button>
    <h2 id="logWorkoutTitle">Log Exercise</h2>
    <div id="logWorkoutContent"></div>
  </div>
</div>

<!-- ESTIMATOR MODAL -->
<div class="modal-overlay" id="estimatorModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('estimatorModal')">✕</button>
    <h2>🔍 Food Estimator</h2>
    <div id="estimatorContent"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('settingsModal')">✕</button>
    <h2>Goals & Profile</h2>
    <div id="settingsContent"></div>
  </div>
</div>

<!-- MEAL DISCOVER MODAL -->
<div class="modal-overlay" id="mealDiscoverModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('mealDiscoverModal')">✕</button>
    <h2>Discover Meals</h2>
    <div id="mealDiscoverContent"></div>
  </div>
</div>

<!-- MEAL PREVIEW MODAL -->
<div class="modal-overlay" id="mealPreviewModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('mealPreviewModal')">✕</button>
    <h2 id="mealPreviewTitle">Recipe Preview</h2>
    <div id="mealPreviewContent"></div>
  </div>
</div>

<!-- WORKOUT DISCOVER MODAL -->
<div class="modal-overlay" id="workoutDiscoverModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('workoutDiscoverModal')">✕</button>
    <h2>Discover Workouts</h2>
    <div id="workoutDiscoverContent"></div>
  </div>
</div>

<!-- WORKOUT EDITOR MODAL -->
<div class="modal-overlay" id="workoutEditorModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('workoutEditorModal')">✕</button>
    <h2 id="workoutEditorTitle">Edit Workout</h2>
    <div id="workoutEditorContent"></div>
  </div>
</div>

<script>
// ─── CONSTANTS ──────────────────────────────────────────────────────────────

const TRAINING_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

const GOALS = {
  cut:       { label: 'Cut',           desc: 'Lose fat, preserve muscle',   color: '#ef4444', calsurplus: -500, proteinMult: 1.0 },
  maintain:  { label: 'Maintain',      desc: 'Stay at current weight',      color: '#f59e0b', calsurplus:    0, proteinMult: 0.85 },
  lean_bulk: { label: 'Lean Bulk',     desc: 'Gain muscle, minimize fat',   color: '#22c55e', calsurplus: +300, proteinMult: 1.0 },
  bulk:      { label: 'Aggressive Bulk', desc: 'Maximize size and strength', color: '#a855f7', calsurplus: +600, proteinMult: 1.0 },
  custom:    { label: 'Custom',         desc: 'Set your own targets',        color: '#64748b', calsurplus:    0, proteinMult: 1.0 }
};

let profile = JSON.parse(localStorage.getItem('ft_profile') || 'null') || {
  goal: 'lean_bulk',
  weightLbs: 163,
  heightIn: 73,   // 6'1"
  age: 22,
  sex: 'male',
  activity: 1.55, // moderate (4-5x/week)
  customTraining: { calories: 3100, protein: 160, carbs: 350, fat: 90 },
  customRest:     { calories: 2600, protein: 160, carbs: 250, fat: 85 }
};

function calcTDEE() {
  const kg = profile.weightLbs * 0.453592;
  const cm = profile.heightIn * 2.54;
  const bmr = profile.sex === 'male'
    ? 10 * kg + 6.25 * cm - 5 * profile.age + 5
    : 10 * kg + 6.25 * cm - 5 * profile.age - 161;
  return Math.round(bmr * profile.activity);
}

function getTargets(d) {
  if (profile.goal === 'custom') {
    return isTrainingDay(d) ? profile.customTraining : profile.customRest;
  }
  const g = GOALS[profile.goal];
  const tdee = calcTDEE();
  const baseCal = tdee + g.calsurplus;
  const protein = Math.round(profile.weightLbs * g.proteinMult);
  const trainingCal = baseCal + 200;
  const restCal = baseCal - 100;
  const fat = Math.round((baseCal * 0.27) / 9);
  const trainingCarbs = Math.round((trainingCal - protein * 4 - fat * 9) / 4);
  const restCarbs = Math.round((restCal - protein * 4 - fat * 9) / 4);
  if (isTrainingDay(d)) {
    return { calories: trainingCal, protein, carbs: Math.max(trainingCarbs, 50), fat };
  } else {
    return { calories: restCal, protein, carbs: Math.max(restCarbs, 50), fat };
  }
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────

function openSettings() {
  renderSettings();
  openModal('settingsModal');
}

function renderSettings() {
  const tdee = calcTDEE();
  const tTargets = getTargets('Monday');   // training
  const rTargets = getTargets('Saturday'); // rest

  document.getElementById('settingsContent').innerHTML = `
    <div class="section-title">Your Goal</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      ${Object.entries(GOALS).map(([key, g]) => `
        <div onclick="setGoal('${key}')" style="padding:12px;border-radius:10px;border:2px solid ${profile.goal===key ? g.color : 'var(--border)'};cursor:pointer;background:${profile.goal===key ? g.color+'18' : 'var(--card)'};transition:all 0.2s">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:600;font-size:0.9rem;color:${profile.goal===key ? g.color : 'var(--text)'}">${g.label}</div>
              <div style="font-size:0.75rem;color:var(--muted)">${g.desc}</div>
            </div>
            ${profile.goal===key ? `<div style="color:${g.color};font-size:1.1rem">✓</div>` : ''}
          </div>
        </div>`).join('')}
    </div>

    <div class="section-title">Your Stats</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><label>Weight (lbs)</label><input type="number" id="sWeight" value="${profile.weightLbs}" oninput="updateProfileField('weightLbs',+this.value);refreshSettingsCalc()"></div>
      <div><label>Age</label><input type="number" id="sAge" value="${profile.age}" oninput="updateProfileField('age',+this.value);refreshSettingsCalc()"></div>
      <div><label>Height (inches)</label><input type="number" id="sHeight" value="${profile.heightIn}" oninput="updateProfileField('heightIn',+this.value);refreshSettingsCalc()"></div>
      <div><label>Sex</label>
        <select id="sSex" onchange="updateProfileField('sex',this.value);refreshSettingsCalc()">
          <option value="male" ${profile.sex==='male'?'selected':''}>Male</option>
          <option value="female" ${profile.sex==='female'?'selected':''}>Female</option>
        </select>
      </div>
    </div>
    <label>Activity Level</label>
    <select id="sActivity" onchange="updateProfileField('activity',+this.value);refreshSettingsCalc()">
      <option value="1.2"  ${profile.activity==1.2?'selected':''}>Sedentary (desk job, little exercise)</option>
      <option value="1.375" ${profile.activity==1.375?'selected':''}>Light (1-3x/week)</option>
      <option value="1.55" ${profile.activity==1.55?'selected':''}>Moderate (4-5x/week)</option>
      <option value="1.725" ${profile.activity==1.725?'selected':''}>Very Active (6-7x/week)</option>
      <option value="1.9"  ${profile.activity==1.9?'selected':''}>Athlete (2x/day)</option>
    </select>

// ─── UTILS ───────────────────────────────────────────────────────────────────

function today() {
  return new Date().toISOString().split('T')[0];
}
function dayName(d) {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return days[new Date(d + 'T12:00:00').getDay()];
}
function isTrainingDay(d) {
  return TRAINING_DAYS.includes(dayName(d));
}
function getDayLog(d) {
  if (!state.dailyLogs[d]) state.dailyLogs[d] = { meals: [] };
  return state.dailyLogs[d];
}
function getTotals(d) {
  const log = getDayLog(d);
  let cal=0,p=0,c=0,f=0;
  log.meals.forEach(m => { cal+=m.cal||0; p+=m.protein||0; c+=m.carbs||0; f+=m.fat||0; });
  return { cal:Math.round(cal), protein:Math.round(p), carbs:Math.round(c), fat:Math.round(f) };
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function pct(val, max) { return Math.min(100, Math.round((val/max)*100)); }

function macroBar(label, val, max, color) {
  const p = pct(val, max);
  return `<div class="macro-bar-wrap">
    <div class="macro-bar-label"><span>${label}</span><span>${val} / ${max}</span></div>
    <div class="macro-bar"><div class="macro-bar-fill" style="width:${p}%;background:${color}"></div></div>
  </div>`;
}

// ─── TABS ────────────────────────────────────────────────────────────────────

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'today') renderToday();
  if (name === 'workout') renderWorkout();
  if (name === 'nutrition') renderNutrition();
  if (name === 'meals') renderMealLibrary();
  if (name === 'shopping') renderShopping();
}

// ─── TODAY ───────────────────────────────────────────────────────────────────

function renderToday() {
  const d = today();
  const dn = dayName(d);
  const t = getTargets(d);
  const tot = getTotals(d);
  const training = isTrainingDay(d);
  const log = getDayLog(d);
  const plan = WORKOUT_PLAN[dn];

  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const pill = document.getElementById('dayTypePill');
  pill.textContent = training ? 'Training' : 'Rest';
  pill.className = 'pill ' + (training ? 'pill-training' : 'pill-rest');

  document.getElementById('todayMacros').innerHTML =
    macroBar('Calories', tot.cal, t.calories, '#a855f7') +
    macroBar('Protein', tot.protein, t.protein, '#3b82f6') +
    macroBar('Carbs', tot.carbs, t.carbs, '#f59e0b') +
    macroBar('Fat', tot.fat, t.fat, '#ec4899');

  // Workout
  const wname = document.getElementById('todayWorkoutName');
  const wlist = document.getElementById('todayWorkoutList');
  if (plan && plan.exercises.length > 0) {
    wname.textContent = plan.name + ' — ' + plan.focus;
    const wlog = state.workoutLogs[d] || {};
    wlist.innerHTML = plan.exercises.slice(0,4).map(ex => {
      const done = wlog[ex.name];
      return `<div class="exercise-row">
        <div>
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-target">${ex.sets} × ${ex.reps}</div>
        </div>
        <div class="exercise-check ${done?'done':''}" onclick="toggleExercise('${d}','${ex.name}',this)">
          ${done ? '✓' : ''}
        </div>
      </div>`;
    }).join('') + (plan.exercises.length > 4 ? `<div class="text-muted" style="padding:8px 0">+${plan.exercises.length-4} more exercises</div>` : '');
  } else {
    wname.textContent = 'Rest Day';
    wlist.innerHTML = '<div class="empty">Recovery day — no workout scheduled</div>';
  }

  // Meals
  const mlist = document.getElementById('todayMealList');
  if (log.meals.length === 0) {
    mlist.innerHTML = '<div class="empty">No meals logged yet</div>';
  } else {
    mlist.innerHTML = log.meals.map((m,i) => `
      <div class="meal-row">
        <div>
          <div class="meal-name">${m.name}</div>
          <div class="macro-chips">
            <span class="chip chip-cal">${m.cal} cal</span>
            <span class="chip chip-p">${m.protein}g P</span>
            <span class="chip chip-c">${m.carbs}g C</span>
            <span class="chip chip-f">${m.fat}g F</span>
          </div>
        </div>
        <button class="delete-btn" onclick="removeMealLog('${d}',${i})">✕</button>
      </div>`).join('');
  }
}

function toggleExercise(d, name, el) {
  if (!state.workoutLogs[d]) state.workoutLogs[d] = {};
  state.workoutLogs[d][name] = !state.workoutLogs[d][name];
  el.classList.toggle('done');
  el.textContent = state.workoutLogs[d][name] ? '✓' : '';
  save();
}

function removeMealLog(d, i) {
  state.dailyLogs[d].meals.splice(i,1);
  save(); renderToday(); renderNutrition();
}

// ─── WORKOUT ─────────────────────────────────────────────────────────────────

function renderWorkout() {
  const dn = state.selectedWorkoutDay || dayName(today());
  selectWorkoutDay(dn);
}

function selectWorkoutDay(dn) {
  state.selectedWorkoutDay = dn;
  document.querySelectorAll('.nav ~ div #wdMon, #wdTue, #wdWed, #wdThu, #wdFri, #wdSat, #wdSun').forEach(b => {});
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach((d,i) => {
    const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    const btn = document.getElementById('wd'+d);
    if (btn) btn.className = 'btn btn-sm ' + (days[i]===dn ? 'btn-primary' : 'btn-secondary');
  });

  const plan = WORKOUT_PLAN[dn];
  const el = document.getElementById('workoutContent');
  if (!plan || plan.exercises.length === 0) {
    el.innerHTML = `<div class="card"><div class="empty">Rest Day — Recovery & Sleep</div></div>`;
    return;
  }

  const d = today();
  const wlog = state.workoutLogs[d] || {};

  el.innerHTML = `<div class="card">

    rows += `<div class="set-row">

function saveWorkoutSets(exName, numSets, d) {
  if (!state.workoutLogs[d]) state.workoutLogs[d] = {};
  const sets = [];
  for (let i=0; i<numSets; i++) {
    sets.push({
      w: document.getElementById('set_w_'+i)?.value || '',
      r: document.getElementById('set_r_'+i)?.value || ''
    });
  }
  state.workoutLogs[d][exName+'_sets'] = sets;
  state.workoutLogs[d][exName] = true;
  save();
  closeModal('logWorkoutModal');
  renderWorkout();
  renderToday();

function exportMeals() {
  const data = JSON.stringify({ version: 1, meals: state.meals }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fittracker-meals-' + today() + '.json';
  a.click();
}

function importMeals(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const imported = data.meals || data; // support array or {meals:[]}
      if (!Array.isArray(imported)) { alert('Invalid file format'); return; }
      let added = 0;
      imported.forEach(m => {
        if (!m.name) return;
        const exists = state.meals.find(x => x.name.toLowerCase() === m.name.toLowerCase());
        if (!exists) { state.meals.push({ ...m, id: m.id || uid() }); added++; }
      });
      save(); renderMealLibrary();
      alert(`Imported ${added} new meal${added !== 1 ? 's' : ''}. ${imported.length - added} already existed.`);
    } catch(err) { alert('Could not read file: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

let selectedFood = null;
let foodSearchTimer = null;

function searchFoods(q) {
  const el = document.getElementById('foodResults');
  if (!q) { el.style.display='none'; return; }

  // Local results first (instant)
  const local = FOOD_DB.filter(f => f.name.toLowerCase().includes(q.toLowerCase()));
  el.style.display = 'block';
  el.innerHTML = (local.length > 0 ? local.map(f => `
    <div class="food-result" onclick="selectFood(${JSON.stringify(f).replace(/"/g,'&quot;')})">
      <span>${f.name}</span>
      <span style="color:var(--muted)">${f.cal} cal/100g</span>
    </div>`).join('') : '') +
    `<div class="food-result" id="offSearchRow" style="color:var(--muted);font-style:italic;justify-content:center">
      🔍 Searching online...
    </div>`;

  // Debounced online search
  clearTimeout(foodSearchTimer);
  foodSearchTimer = setTimeout(() => searchFoodsOnline(q), 500);
}

async function searchFoodsOnline(q) {
  const el = document.getElementById('foodResults');
  const statusRow = document.getElementById('offSearchRow');
  try {
    const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=10&fields=product_name,nutriments,serving_size`;
    const res = await fetch(url);
    const data = await res.json();
    const products = (data.products || []).filter(p =>
      p.product_name &&
      p.nutriments &&
      p.nutriments['energy-kcal_100g'] > 0
    ).slice(0, 8);

    if (statusRow) statusRow.remove();

    if (products.length > 0) {
      const onlineSection = `<div style="padding:6px 12px;font-size:0.7rem;color:var(--accent2);background:var(--bg);border-bottom:1px solid var(--border)">ONLINE RESULTS</div>` +
        products.map(p => {
          const n = p.nutriments;
          const food = {
            name: p.product_name.slice(0, 60),
            unit: 'g', per: 100,
            cal: Math.round(n['energy-kcal_100g'] || 0),
            p:   Math.round((n['proteins_100g'] || 0) * 10) / 10,
            c:   Math.round((n['carbohydrates_100g'] || 0) * 10) / 10,
            f:   Math.round((n['fat_100g'] || 0) * 10) / 10
          };
          return `<div class="food-result" onclick="selectFood(${JSON.stringify(food).replace(/"/g,'&quot;')})">
            <span style="max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${food.name}</span>
            <span style="color:var(--muted)">${food.cal} cal/100g</span>
          </div>`;
        }).join('');
      el.innerHTML = el.innerHTML + onlineSection;
    } else {
      if (statusRow) statusRow.textContent = 'No online results found';
    }
  } catch(e) {
    if (statusRow) statusRow.textContent = 'Offline — showing local results only';
  }
}

function selectFood(food) {
  selectedFood = food;
  document.getElementById('foodSearch').value = food.name;
  document.getElementById('foodResults').style.display = 'none';
  document.getElementById('foodUnit').textContent = food.unit;
  document.getElementById('foodAmount').value = food.per;
  document.getElementById('foodAmountRow').style.display = 'block';
}

function addIngredient() {
  if (!selectedFood) return;
  const amount = parseFloat(document.getElementById('foodAmount').value) || 0;
  const ratio = amount / selectedFood.per;
  state.builderIngredients.push({
    name: selectedFood.name,
    amount: amount,
    unit: selectedFood.unit,
    cal: selectedFood.cal * ratio,
    p: selectedFood.p * ratio,
    c: selectedFood.c * ratio,
    f: selectedFood.f * ratio
  });
  selectedFood = null;
  document.getElementById('foodSearch').value = '';
  document.getElementById('foodAmountRow').style.display = 'none';
  const name = document.getElementById('builderName').value;
  renderBuilderContent(name);
}

function removeIngredient(i) {
  state.builderIngredients.splice(i,1);
  const name = document.getElementById('builderName').value;
  renderBuilderContent(name);
}

function calcIngredientTotals() {
  let cal=0,p=0,c=0,f=0;
  state.builderIngredients.forEach(i => { cal+=i.cal||0; p+=i.p||0; c+=i.c||0; f+=i.f||0; });
  return { cal:Math.round(cal), p:Math.round(p), c:Math.round(c), f:Math.round(f) };
}

function saveMeal() {
  const name = document.getElementById('builderName').value.trim();
  if (!name) { alert('Please enter a meal name'); return; }
  const tot = calcIngredientTotals();
  const meal = {
    id: state.editingMealId || uid(),
    name, ingredients: state.builderIngredients,
    cal: tot.cal, protein: tot.p, carbs: tot.c, fat: tot.f
  };
  if (state.editingMealId) {
    const idx = state.meals.findIndex(m => m.id === state.editingMealId);
    if (idx >= 0) state.meals[idx] = meal;
  } else {
    state.meals.push(meal);
  }
  save(); closeModal('mealBuilderModal'); renderMealLibrary();
}

function renderShopping() {

function generateShoppingList() {
  const selected = [...document.querySelectorAll('[id^="sm_"]:checked')].map(c => c.value);
  if (selected.length === 0) { alert('Select at least one meal'); return; }

  const meals = state.meals.filter(m => selected.includes(m.id));
  const allIngredients = {};

  meals.forEach(meal => {
    (meal.ingredients||[]).forEach(ing => {
      const key = ing.name.toLowerCase();
      if (allIngredients[key]) {
        allIngredients[key].amount += ing.amount;
      } else {
        allIngredients[key] = { name: ing.name, amount: ing.amount, unit: ing.unit };
      }
    });
  });

  const cats = {
    'Proteins': ['chicken','turkey','salmon','tuna','beef','shrimp','egg','protein powder'],
    'Dairy': ['yogurt','cottage','milk','cheese'],
    'Carbs': ['rice','oat','pasta','potato','bread','banana','apple','blueberr','orange'],
    'Fats & Oils': ['olive oil','almond','avocado','peanut'],
    'Vegetables': ['broccoli','spinach'],
    'Other': []
  };

  const assigned = new Set();
  let html = '';

  Object.entries(cats).forEach(([cat, keywords]) => {
    const items = Object.values(allIngredients).filter(ing => {
      if (assigned.has(ing.name.toLowerCase())) return false;
      const match = keywords.some(k => ing.name.toLowerCase().includes(k));
      if (match) assigned.add(ing.name.toLowerCase());
      return match;
    });
    if (items.length === 0 && cat !== 'Other') return;

    // Add uncategorized to Other
    if (cat === 'Other') {
      Object.values(allIngredients).forEach(ing => {
        if (!assigned.has(ing.name.toLowerCase())) items.push(ing);
      });
    }
    if (items.length === 0) return;

    html += `<div class="card"><div class="section-title" style="margin-top:0">${cat}</div>`;
    html += items.map(ing => {
      const key = 'shop_' + ing.name.replace(/\s/g,'_');
      const checked = state.shoppingChecked[key];
      return `<div class="shopping-item ${checked?'checked':''}" id="si_${key}">
        <input type="checkbox" id="${key}" ${checked?'checked':''} onchange="toggleShop('${key}')">
        <label for="${key}">${ing.name} — ${Math.round(ing.amount)} ${ing.unit}</label>
      </div>`;
    }).join('');
    html += '</div>';
  });

  html += `<button class="btn btn-secondary w-full" onclick="clearShoppingChecks()" style="margin-top:8px">Clear Checks</button>`;
  document.getElementById('shoppingListOutput').innerHTML = html;
}

function toggleShop(key) {
  state.shoppingChecked[key] = !state.shoppingChecked[key];
  const row = document.getElementById('si_' + key);
  if (row) row.classList.toggle('checked', state.shoppingChecked[key]);
  save();
}

function clearShoppingChecks() {
  state.shoppingChecked = {};
  save(); renderShopping();
  document.getElementById('shoppingListOutput').innerHTML = '';
}

    <div id="estimatorResults"></div>`;
  openModal('estimatorModal');
}

function runEstimator() {
  const raw = document.getElementById('estimatorInput').value.trim();
  if (!raw) return;

  // Parse: strip filler words, split on commas/and/with
  const stripped = raw.toLowerCase()
    .replace(/\b(a|an|the|some|little|bit of|side of|on top|topped with|topped|drizzled|drizzle|extra|large|small|medium|half|double|no|without)\b/g, ' ')
    .replace(/[()]/g, '');
  const tokens = stripped.split(/,|and|with|\+|&/).map(t => t.trim()).filter(Boolean);

  // Also try the whole phrase for restaurant combos
  const allPhrases = [stripped, ...tokens];

  estimatorItems = [];
  const matched = new Set();

  allPhrases.forEach(phrase => {
    // Find best matching food in DB
    let best = null, bestScore = 0;
    FOOD_DB.forEach(food => {
      const fname = food.name.toLowerCase();
      const fwords = fname.split(' ');
      const pwords = phrase.split(' ');
      // Score: how many food name words appear in phrase
      let score = fwords.filter(w => w.length > 2 && pwords.some(pw => pw.includes(w) || w.includes(pw))).length;
      // Bonus for exact substring match
      if (phrase.includes(fname)) score += 3;
      if (fname.includes(phrase.replace(/\s+/g,' ').trim())) score += 2;
      if (score > bestScore) { bestScore = score; best = food; }
    });

    if (best && bestScore > 0 && !matched.has(best.name)) {
      matched.add(best.name);
      // Determine default portion
      const fname = best.name.toLowerCase();
      let amount = best.per; // default to the "per" unit
      for (const [hint, portion] of Object.entries(PORTION_HINTS)) {
        if (fname.includes(hint) || phrase.includes(hint)) {
          amount = portion;
          break;
        }
      }
      const ratio = amount / best.per;
      estimatorItems.push({
        food: best, amount,
        cal: Math.round(best.cal * ratio),
        p: Math.round(best.p * ratio * 10) / 10,
        c: Math.round(best.c * ratio * 10) / 10,
        f: Math.round(best.f * ratio * 10) / 10
      });
    }
  });

  renderEstimatorResults();
}

function renderEstimatorResults() {
  const el = document.getElementById('estimatorResults');
  if (estimatorItems.length === 0) {
    el.innerHTML = '<div class="empty" style="margin-top:16px">No foods matched — try being more specific about ingredients</div>';
    return;
  }

  const totals = estimatorItems.reduce((a, i) => ({
    cal: a.cal + i.cal, p: a.p + i.p, c: a.c + i.c, f: a.f + i.f
  }), { cal: 0, p: 0, c: 0, f: 0 });

  el.innerHTML = `
    <div class="section-title" style="margin-top:16px">Matched Components</div>
    <div id="estimatorItemList">
      ${estimatorItems.map((item, i) => `
        <div class="ingredient-row" id="estrow_${i}">
          <div style="flex:1;min-width:0">
            <div style="font-size:0.85rem;font-weight:500">${item.food.name}</div>
            <div style="display:flex;gap:6px;align-items:center;margin-top:4px">
              <input type="number" value="${item.amount}" min="0" step="any"
                oninput="updateEstimatorItem(${i}, +this.value)"
                style="width:70px;font-size:0.8rem;padding:4px 8px">
              <span style="font-size:0.75rem;color:var(--muted)">${item.food.unit}</span>
            </div>
          </div>
          <div style="text-align:right;font-size:0.75rem" id="estmacro_${i}">
            <div style="color:#c084fc">${item.cal} cal</div>
            <div style="color:#60a5fa">${item.p}g P</div>
            <div style="color:#fbbf24">${item.c}g C · <span style="color:#f472b6">${item.f}g F</span></div>
          </div>
          <button class="delete-btn" onclick="removeEstimatorItem(${i})">✕</button>
        </div>`).join('')}
    </div>

    <div class="card mt-16" style="background:var(--bg)" id="estimatorTotals">
      <h3>Estimated Total</h3>
      <div class="macro-chips mt-8">
        <span class="chip chip-cal">${Math.round(totals.cal)} cal</span>
        <span class="chip chip-p">${Math.round(totals.p)}g protein</span>
        <span class="chip chip-c">${Math.round(totals.c)}g carbs</span>
        <span class="chip chip-f">${Math.round(totals.f)}g fat</span>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-secondary w-full" onclick="logEstimate()">+ Log to Today</button>
      <button class="btn btn-primary w-full" onclick="saveEstimateToLibrary()">Save to Library</button>
    </div>`;
}

function updateEstimatorItem(i, amount) {
  const item = estimatorItems[i];
  if (!item || amount < 0) return;
  item.amount = amount;
  const ratio = amount / item.food.per;
  item.cal = Math.round(item.food.cal * ratio);
  item.p   = Math.round(item.food.p * ratio * 10) / 10;
  item.c   = Math.round(item.food.c * ratio * 10) / 10;
  item.f   = Math.round(item.food.f * ratio * 10) / 10;
  // Update macro display
  const macroEl = document.getElementById('estmacro_' + i);
  if (macroEl) macroEl.innerHTML = `<div style="color:#c084fc">${item.cal} cal</div><div style="color:#60a5fa">${item.p}g P</div><div style="color:#fbbf24">${item.c}g C · <span style="color:#f472b6">${item.f}g F</span></div>`;
  // Update totals
  const totals = estimatorItems.reduce((a, x) => ({cal:a.cal+x.cal,p:a.p+x.p,c:a.c+x.c,f:a.f+x.f}),{cal:0,p:0,c:0,f:0});
  const te = document.getElementById('estimatorTotals');
  if (te) te.innerHTML = `<h3>Estimated Total</h3><div class="macro-chips mt-8"><span class="chip chip-cal">${Math.round(totals.cal)} cal</span><span class="chip chip-p">${Math.round(totals.p)}g protein</span><span class="chip chip-c">${Math.round(totals.c)}g carbs</span><span class="chip chip-f">${Math.round(totals.f)}g fat</span></div>`;
}

function removeEstimatorItem(i) {
  estimatorItems.splice(i, 1);
  renderEstimatorResults();
}

function getEstimateTotals() {
  return estimatorItems.reduce((a, x) => ({cal:a.cal+x.cal,p:a.p+x.p,c:a.c+x.c,f:a.f+x.f}),{cal:0,p:0,c:0,f:0});
}

function logEstimate() {
  const name = document.getElementById('estimatorMealName')?.value.trim() ||
               document.getElementById('estimatorInput')?.value.trim().slice(0,40) || 'Estimated Meal';
  const t = getEstimateTotals();
  getDayLog(today()).meals.push({ name, cal: Math.round(t.cal), protein: Math.round(t.p), carbs: Math.round(t.c), fat: Math.round(t.f) });
  save(); closeModal('estimatorModal'); renderToday(); renderNutrition();
}

function saveEstimateToLibrary() {
  const name = document.getElementById('estimatorMealName')?.value.trim() ||
               document.getElementById('estimatorInput')?.value.trim().slice(0,40) || 'Estimated Meal';
  const t = getEstimateTotals();
  state.meals.push({
    id: uid(), name,
    cal: Math.round(t.cal), protein: Math.round(t.p), carbs: Math.round(t.c), fat: Math.round(t.f),
    ingredients: estimatorItems.map(i => ({ name: i.food.name, amount: i.amount, unit: i.food.unit, cal: i.cal, p: i.p, c: i.c, f: i.f }))
  });
  save(); closeModal('estimatorModal'); renderMealLibrary();
  alert(`"${name}" saved to your Meal Library!`);
}

async function previewMeal(id, name) {
  document.getElementById('mealPreviewTitle').textContent = name;

}

function estimateMacrosFromIngredients(ingredients) {
  let cal = 0, p = 0, c = 0, f = 0;
  ingredients.forEach(ing => {
    const match = FOOD_DB.find(f => ing.name.toLowerCase().includes(f.name.split(' ')[0].toLowerCase()) || f.name.toLowerCase().includes(ing.name.toLowerCase().split(' ')[0]));
    if (match) {
      const amount = parseFloat(ing.measure) || match.per;
      const ratio = amount / match.per;
      cal += match.cal * ratio;
      p += match.p * ratio;
      c += match.c * ratio;
      f += match.f * ratio;
    }
  });
  // If nothing matched, give a rough 500 cal estimate
  if (cal === 0) { cal = 500; p = 25; c = 50; f = 15; }
  return { cal: Math.round(cal), p: Math.round(p), c: Math.round(c), f: Math.round(f) };
}

function addDiscoveredMeal(name, cal, p, c, f, ingredients) {
  const meal = {
    id: uid(), name,
    cal, protein: p, carbs: c, fat: f,
    ingredients: ingredients.map(i => ({ name: i.name, amount: 100, unit: 'g', cal: 0, p: 0, c: 0, f: 0 }))
  };
  state.meals.push(meal);
  save();
  closeModal('mealPreviewModal');
  closeModal('mealDiscoverModal');
  renderMealLibrary();
  alert(`"${name}" added to your Meal Library! Open it in Edit to adjust the macros.`);
}

async function suggestByMacros() {
  const tot = getTotals(today());
  const t = getTargets(today());

  const el = document.getElementById('discoverResults');
  el.innerHTML = '<div class="empty">Finding meals for your macros...</div>';

  // Search for high-protein meals if protein is low, balanced otherwise
  const queries = remP > 40 ? ['chicken','beef','salmon','tuna','turkey'] : ['pasta','salad','rice','soup','stir fry'];
  const query = queries[Math.floor(Math.random() * queries.length)];

  try {
    const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`);
    const data = await res.json();
    const meals = (data.meals || []).slice(0, 8);
    if (meals.length === 0) { el.innerHTML = '<div class="empty">No suggestions found — try browsing categories</div>'; return; }

    el.innerHTML = `<div class="section-title">Suggested for you (${remCal} cal · ${remP}g protein left)</div>` +
      meals.map(m => `
        <div class="meal-row" style="cursor:pointer" onclick="previewMeal('${m.idMeal}','${(m.strMeal||'').replace(/'/g,"\\'")}')">
          <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
            ${m.strMealThumb ? `<img src="${m.strMealThumb}/preview" style="width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0">` : ''}
            <div class="meal-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.strMeal}</div>
          </div>
          <span style="color:var(--accent2)">›</span>
        </div>`).join('');
  } catch(e) { el.innerHTML = '<div class="empty">Offline — check connection</div>'; }
}

function openWorkoutDiscover() {
  renderWorkoutDiscoverHome();
  openModal('workoutDiscoverModal');
}

function renderWorkoutDiscoverHome() {
  document.getElementById('workoutDiscoverContent').innerHTML = `
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:12px">Browse preset programs or use individual days to replace your current plan.</p>
    ${Object.entries(WORKOUT_PROGRAMS).map(([name, prog]) => `
      <div class="card" style="margin-bottom:10px">
        <div class="flex justify-between align-center">
          <div>
            <div class="meal-name" style="font-size:1rem">${name}</div>
            <div style="font-size:0.78rem;color:var(--muted);margin-top:2px">${prog.desc}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn btn-secondary btn-sm w-full" onclick="previewWorkoutProgram('${name.replace(/'/g,"\\'")}')">Preview</button>
          <button class="btn btn-primary btn-sm w-full" onclick="importFullProgram('${name.replace(/'/g,"\\'")}')">Import All</button>
        </div>
      </div>`).join('')}`;
}

function previewWorkoutProgram(name) {
  const prog = WORKOUT_PROGRAMS[name];
  if (!prog) return;
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  document.getElementById('workoutDiscoverContent').innerHTML = `
    <button class="btn btn-secondary btn-sm" onclick="renderWorkoutDiscoverHome()" style="margin-bottom:12px">← Back</button>
    <div class="meal-name" style="font-size:1rem;margin-bottom:4px">${name}</div>
    <div style="font-size:0.82rem;color:var(--muted);margin-bottom:12px">${prog.desc}</div>
    ${days.map(day => {
      const d = prog.days[day];
      if (!d) return '';
      return `<div class="card" style="margin-bottom:8px">
        <div class="flex justify-between align-center">
          <div>
            <div style="font-weight:600;font-size:0.9rem">${day} — ${d.name}</div>
            <div style="font-size:0.75rem;color:var(--muted)">${d.focus}</div>
          </div>
          ${d.exercises.length > 0 ? `<button class="btn btn-sm btn-primary" onclick="importSingleDay('${name.replace(/'/g,"\\'")}','${day}')">Use</button>` : ''}
        </div>
        ${d.exercises.length > 0 ? `<div style="margin-top:8px">${d.exercises.map(ex => `<div style="font-size:0.8rem;color:var(--muted);padding:2px 0">${ex.name} — ${ex.sets}×${ex.reps}</div>`).join('')}</div>` : `<div style="font-size:0.8rem;color:var(--muted);margin-top:4px">Rest</div>`}
      </div>`;
    }).join('')}
    <button class="btn btn-primary w-full mt-8" onclick="importFullProgram('${name.replace(/'/g,"\\'")}')">Import Full Program</button>`;
}

function importSingleDay(programName, day) {
  const prog = WORKOUT_PROGRAMS[programName];
  if (!prog || !prog.days[day]) return;
  if (!confirm(`Replace your ${day} workout with "${prog.days[day].name}" from ${programName}?`)) return;
  WORKOUT_PLAN[day] = JSON.parse(JSON.stringify(prog.days[day]));
  save(); renderWorkout(); renderToday();
  closeModal('workoutDiscoverModal');
  alert(`${day} updated!`);
}

function importFullProgram(programName) {
  const prog = WORKOUT_PROGRAMS[programName];
  if (!prog) return;
  if (!confirm(`Replace your entire workout plan with "${programName}"? This cannot be undone (unless you export first).`)) return;
  Object.assign(WORKOUT_PLAN, JSON.parse(JSON.stringify(prog.days)));
  save(); renderWorkout(); renderToday();
  closeModal('workoutDiscoverModal');
  alert(`"${programName}" imported successfully!`);
}

// ─── WORKOUT EDITOR ───────────────────────────────────────────────────────────

let editingDay = null;
let editorExercises = [];
let exSearchTimer = null;

function openWorkoutEditor(day) {
  editingDay = day;
  editorExercises = JSON.parse(JSON.stringify(WORKOUT_PLAN[day].exercises || []));
  document.getElementById('workoutEditorTitle').textContent = 'Edit ' + day;
  renderWorkoutEditor();
  openModal('workoutEditorModal');
}

function renderWorkoutEditor() {
  const plan = WORKOUT_PLAN[editingDay];
  const exRows = editorExercises.map((ex, i) => `
    <div class="exercise-row" id="exrow_${i}">
      <div style="flex:1;min-width:0">
        <input value="${ex.name}" oninput="editorExercises[${i}].name=this.value" style="margin-bottom:6px;font-size:0.85rem">
        <div style="display:flex;gap:6px">
          <input type="number" value="${ex.sets}" min="1" max="10" oninput="editorExercises[${i}].sets=+this.value" style="width:60px;font-size:0.82rem" placeholder="Sets">
          <input value="${ex.reps}" oninput="editorExercises[${i}].reps=this.value" style="flex:1;font-size:0.82rem" placeholder="Reps e.g. 8-12">
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-left:8px">
        <button class="btn-icon" onclick="moveExercise(${i},-1)" ${i===0?'disabled':''}>↑</button>
        <button class="btn-icon" onclick="moveExercise(${i},1)" ${i===editorExercises.length-1?'disabled':''}>↓</button>
        <button class="delete-btn" onclick="removeEditorExercise(${i})">✕</button>
      </div>
    </div>`).join('');

  document.getElementById('workoutEditorContent').innerHTML = `
    <label>Workout Name</label>
    <input id="editorDayName" value="${plan.name}" placeholder="e.g. Push">
    <label>Focus / Description</label>
    <input id="editorDayFocus" value="${plan.focus}" placeholder="e.g. Chest / Shoulders">

    <div class="section-title" style="margin-top:16px">Exercises</div>
    <div id="editorExList">${exRows || '<div class="text-muted" style="padding:8px 0">No exercises — add one below</div>'}</div>

    <div class="section-title" style="margin-top:16px">Add Exercise</div>
    <input id="exSearch" placeholder="Search exercises (e.g. bench press, squat...)" oninput="searchExercises(this.value)">
    <div id="exSearchResults" class="food-search-results" style="display:none"></div>

    <div id="newExRow" style="display:none;margin-top:8px">
      <input id="newExName" placeholder="Exercise name" style="margin-bottom:6px">
      <div style="display:flex;gap:8px">
        <input id="newExSets" type="number" placeholder="Sets" min="1" max="10" style="width:80px">
        <input id="newExReps" placeholder="Reps (e.g. 8-12)" style="flex:1">
        <button class="btn btn-primary btn-sm" onclick="addEditorExercise()" style="white-space:nowrap">Add</button>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:20px">
      <button class="btn btn-secondary w-full" onclick="resetDayToDefault('${editingDay}')">Reset to Default</button>
      <button class="btn btn-primary w-full" onclick="saveWorkoutEdits()">Save Day</button>
    </div>`;
}

function moveExercise(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= editorExercises.length) return;
  [editorExercises[i], editorExercises[j]] = [editorExercises[j], editorExercises[i]];
  renderWorkoutEditor();
}

function removeEditorExercise(i) {
  editorExercises.splice(i, 1);
  renderWorkoutEditor();
}

function addEditorExercise() {
  const name = document.getElementById('newExName').value.trim();
  const sets = parseInt(document.getElementById('newExSets').value) || 3;
  const reps = document.getElementById('newExReps').value.trim() || '10-12';
  if (!name) { alert('Enter an exercise name'); return; }
  editorExercises.push({ name, sets, reps });
  document.getElementById('newExName').value = '';
  document.getElementById('newExSets').value = '';
  document.getElementById('newExReps').value = '';
  document.getElementById('newExRow').style.display = 'none';
  document.getElementById('exSearch').value = '';
  renderWorkoutEditor();
}

function saveWorkoutEdits() {
  const name = document.getElementById('editorDayName').value.trim() || WORKOUT_PLAN[editingDay].name;
  const focus = document.getElementById('editorDayFocus').value.trim() || WORKOUT_PLAN[editingDay].focus;
  WORKOUT_PLAN[editingDay] = { name, focus, exercises: editorExercises };
  save();
  closeModal('workoutEditorModal');
  renderWorkout();
  renderToday();
}

function resetDayToDefault(day) {
  if (!confirm('Reset ' + day + ' to the default workout?')) return;
  WORKOUT_PLAN[day] = JSON.parse(JSON.stringify(DEFAULT_WORKOUT_PLAN[day]));
  editorExercises = JSON.parse(JSON.stringify(WORKOUT_PLAN[day].exercises || []));
  save();
  renderWorkoutEditor();
}

async function searchExercises(q) {
  const el = document.getElementById('exSearchResults');
  const newExRow = document.getElementById('newExRow');
  if (!q) { el.style.display = 'none'; newExRow.style.display = 'none'; return; }

  // Show manual entry option immediately
  newExRow.style.display = 'block';
  document.getElementById('newExName').value = q;

  clearTimeout(exSearchTimer);
  exSearchTimer = setTimeout(async () => {
    el.style.display = 'block';
    el.innerHTML = '<div class="food-result" style="color:var(--muted);font-style:italic;justify-content:center">🔍 Searching...</div>';
    try {
      const res = await fetch(`https://wger.de/api/v2/exercise/search/?term=${encodeURIComponent(q)}&language=english&format=json`);
      const data = await res.json();
      const suggestions = (data.suggestions || []).slice(0, 10);
      if (suggestions.length === 0) {
        el.innerHTML = '<div class="food-result" style="color:var(--muted);justify-content:center">No results — enter manually below</div>';
        return;
      }
      el.innerHTML = suggestions.map(s => `
        <div class="food-result" onclick="pickExercise(${JSON.stringify(s.value).replace(/"/g,'&quot;')})">
          <span>${s.value}</span>
          <span style="color:var(--muted);font-size:0.75rem">${s.data?.category?.name || ''}</span>
        </div>`).join('');
    } catch(e) {
      el.innerHTML = '<div class="food-result" style="color:var(--muted);justify-content:center">Offline — enter manually below</div>';
    }
  }, 400);
}

function pickExercise(name) {
  document.getElementById('exSearch').value = name;
  document.getElementById('exSearchResults').style.display = 'none';
  document.getElementById('newExName').value = name;
  document.getElementById('newExRow').style.display = 'block';
  document.getElementById('newExSets').focus();
}

function exportWorkout() {
  const data = JSON.stringify({ version: 1, workout: WORKOUT_PLAN }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fittracker-workout-' + today() + '.json';
  a.click();
}

function importWorkout(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const plan = data.workout || data;
      const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
      const valid = days.every(d => plan[d] && Array.isArray(plan[d].exercises));
      if (!valid) { alert('Invalid workout file'); return; }
      Object.assign(WORKOUT_PLAN, plan);
      save(); renderWorkout(); renderToday();
      alert('Workout plan imported successfully!');
    } catch(err) { alert('Could not read file: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

// ─── MODAL HELPERS ────────────────────────────────────────────────────────────

function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ─── INIT ─────────────────────────────────────────────────────────────────────

renderToday();
</script>
